openapi: 3.1.0
info:
  title: Root OpenAPI Test API
  version: 1.0.0
paths:
  /users:
    get:
      summary: List root users
      operationId: listRootUsers
      responses:
        "200":
          description: A list of root users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - email
                      properties:
                        id:
                          type: string
                          example: root_user_123
                        email:
                          type: string
                          format: email
                          example: ada@example.com
