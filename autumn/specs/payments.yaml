openapi: 3.1.0
info:
  title: Payments API
  version: 1.0.0
servers:
  - url: https://api.example.com/payments
paths:
  /users:
    get:
      summary: List payment users
      description: Returns users available through the payments API.
      operationId: listPaymentUsers
      responses:
        "200":
          description: A list of payment users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - plan
                      properties:
                        id:
                          type: string
                          example: payment_user_123
                        plan:
                          type: string
                          example: pro
