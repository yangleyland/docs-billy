openapi: 3.1.0
info:
  title: Mounted OpenAPI Test API
  version: 1.0.0
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: A list of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: string
                          example: user_123
                        name:
                          type: string
                          example: Ada Lovelace
